name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: pip install jinja2 pygments markdown nh3
      - name: Build static site
        run: python build.py
      - name: Verify output
        run: test -f _site/index.html

# ci+codeql probe 2 (no-op, will be discarded)
