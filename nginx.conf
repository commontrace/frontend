# docs.commontrace.org — serve /docs/ as root
server {
    listen ${PORT};
    server_name docs.commontrace.org;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location /static/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Serve docs/index.html at root
    location = / {
        try_files /docs/index.html =404;
    }

    # Redirect site pages to main domain
    location /browse/ {
        return 301 https://commontrace.org$request_uri;
    }
    location /about/ {
        return 301 https://commontrace.org$request_uri;
    }
    location /sponsors/ {
        return 301 https://commontrace.org$request_uri;
    }
    location /trace/ {
        return 301 https://commontrace.org$request_uri;
    }
    location /tag/ {
        return 301 https://commontrace.org$request_uri;
    }

    # Everything else
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}

# Main site — commontrace.org (default)
server {
    listen ${PORT} default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 256;
    gzip_vary on;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (URLs include ?v=hash for cache-busting)
    location /static/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Clean URLs — try path, then path/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
